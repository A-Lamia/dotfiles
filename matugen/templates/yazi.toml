# vim:fileencoding=utf-8:foldmethod=marker


[mgr]
cwd = { fg = "#81c8be" }

# Hovered
hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#e5c890", bold = true, italic = true, underline = true }
find_position = { fg = "#f4b8e4", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#a6d189", bg = "#a6d189" }
marker_cut      = { fg = "#e78284", bg = "#e78284" }
marker_marked   = { fg = "#81c8be", bg = "#81c8be" }
marker_selected = { fg = "#e5c890", bg = "#e5c890" }

# Tab
tab_active   = { reversed = true }
tab_inactive = {}
tab_width    = 1

# Count
count_copied   = { fg = "#303446", bg = "#a6d189" }
count_cut      = { fg = "#303446", bg = "#e78284" }
count_selected = { fg = "#303446", bg = "#e5c890" }

# Border
border_symbol = "│"
border_style  = { fg = "{{colors.surface_container.default.hex}}" }


[tabs]
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
inactive = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }


[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }

# Select mode
# select_main = { fg = "#303446", bg = "#8888fe", bold = true }
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.on_secondary_container.default.hex}}", bg = "{{colors.secondary_container.default.hex}}" }
# select_main = { fg = "{{colors.on_magenta.default.hex}}", bg = "{{colors.magenta.default.hex}}", bold = true }
# select_alt  = { fg = "{{colors.magenta.default.hex}}", bg = "{{colors.on_magenta.default.hex}}" }

# unset_main = { fg = "#303446", bg = "#fe8888", bold = true }
unset_main = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
unset_alt  = { fg = "{{colors.on_tertiary_container.default.hex}}", bg = "{{colors.tertiary_container.default.hex}}" }


[status]
perm_sep   = { fg = "#838ba7" }
perm_type  = { fg = "{{colors.primary.default.hex}}" } # NOTE: this is supposed to be blue fix this later when adding colors
perm_read  = { fg = "#e5c890" }
perm_write = { fg = "#e78284" }
perm_exec  = { fg = "#a6d189" }

progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.on_primary.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.on_primary.default.hex}}" }


[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "#f4b8e4", bold = true }
inactive = {}


[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }


[cmp]
border = { fg = "{{colors.primary.default.hex}}" }


[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = {}
hovered = { fg = "#f4b8e4", underline = true }


[which]
mask            = { bg = "{{colors.surface_bright.default.hex}}" }
cand            = { fg = "{{colors.surface_tint.default.hex}}" }
rest            = { fg = "#949cbb" }
desc            = { fg = "{{colors.on_surface.default.hex}}" }
separator       = "  "
separator_style = { fg = "#626880" }


[help]
on      = { fg = "#81c8be" }
run     = { fg = "#f4b8e4" }
hovered = { reversed = true, bold = true }
footer  = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }


[notify]
title_info  = { fg = "#a6d189" }
title_warn  = { fg = "#e5c890" }
title_error = { fg = "#e78284" }


[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#81c8be" },

	# Media
	{ mime = "{audio,video}/*", fg = "#e5c890" },

	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f4b8e4" },

	# Documents
	{ mime = "application/{pdf,doc,rtf}", fg = "#a6d189" },

	# Fallback
	{ name = "*", fg = "{{colors.secondary.default.hex}}" },
	{ name = "*/", fg = "{{colors.primary.default.hex}}" }
]

