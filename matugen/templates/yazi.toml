[mgr]
cwd = { fg = "{{colors.tertiary.default.hex}}" }

# Hovered
hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "{{colors.yellow.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.magenta.default.hex}}", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "{{colors.green.default.hex}}", bg = "{{colors.green.default.hex}}" }
marker_cut      = { fg = "{{colors.red.default.hex}}", bg = "{{colors.red.default.hex}}" }
marker_marked   = { fg = "{{colors.blue.default.hex}}", bg = "{{colors.blue.default.hex}}" }
marker_selected = { fg = "{{colors.yellow.default.hex}}", bg = "{{colors.yellow.default.hex}}" }

# Tab
tab_active   = { reversed = true }
tab_inactive = {}
tab_width    = 1

# Count
count_copied   = { fg = "#2E3446", bg = "{{colors.green.default.hex}}" }
count_cut      = { fg = "#2E3446", bg = "{{colors.yellow.default.hex}}" }
count_selected = { fg = "#2E3446", bg = "{{colors.red.default.hex}}" }

# Border
border_symbol = "│"
border_style  = { fg = "{{colors.primary.default.hex}}" }


[tabs]
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
inactive = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.on_primary.default.hex}}" }


[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }

# Select mode
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.on_secondary_container.default.hex}}", bg = "{{colors.secondary_container.default.hex}}" }

unset_main = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
unset_alt  = { fg = "{{colors.on_tertiary_container.default.hex}}", bg = "{{colors.tertiary_container.default.hex}}" }


[status]
perm_sep   = { fg = "{{colors.outline.default.hex}}" }
perm_type  = { fg = "{{colors.blue.default.hex}}" }
perm_read  = { fg = "{{colors.red.default.hex}}" }
perm_write = { fg = "{{colors.yellow.default.hex}}" }
perm_exec  = { fg = "{{colors.green.default.hex}}" }

progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.on_primary.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.on_primary.default.hex}}" }


[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "#f4b8e4", bold = true }
inactive = {}


[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }


[cmp]
border = { fg = "{{colors.primary.default.hex}}" }


[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = {}
hovered = { fg = "#f4b8e4", underline = true }


[which]
mask            = { bg = "{{colors.surface_bright.default.hex}}" }
cand            = { fg = "{{colors.surface_tint.default.hex}}" }
rest            = { fg = "#949cbb" }
desc            = { fg = "{{colors.on_surface.default.hex}}" }
separator       = "  "
separator_style = { fg = "#626880" }


[help]
on      = { fg = "{{colors.cyan.default.hex}}" }
run     = { fg = "{{colors.magenta.default.hex}}" }
hovered = { reversed = true, bold = true }
footer  = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }


[notify]
title_info  = { fg = "{{colors.green.default.hex}}" }
title_warn  = { fg = "{{colors.yellow.default.hex}}" }
title_error = { fg = "{{colors.red.default.hex}}" }

[confirm]  
border     = { fg = "{{colors.tertiary.default.hex}}", bold = true }  
title      = { fg = "{{colors.tertiary.default.hex}}", bold = true }  
body       = { fg = "{{colors.on_background.default.hex}}" }  
list       = { fg = "{{colors.on_background.default.hex}}" }  
btn_yes    = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }  
btn_no     = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }  
btn_labels = [ "  [Y]es  ", "  (N)o   " ]

[filetype]
rules = [
	# Executable
	# { url = "*", is = "exec", fg = "{{colors.red.default.hex}}" },
	# Images
	# { mime = "image/*", fg = "{{colors.cyan.default.hex}}" },
	# Archives
	# { mime = "application/{zip,rar,7z*,tar,gz,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{colors.blue.default.hex}}" },
	# Documents
	# { mime = "application/{pdf,doc,rtf,epub}", fg = "{{colors.green.default.hex}}" },
	# Media
	# { mime = "{audio,video}/*", fg = "{{colors.yellow.default.hex}}" },
	# Fallback
	{ url = "*", fg = "{{colors.on_background.default.hex}}" },
	{ url = "*/", fg = "{{colors.primary.default.hex}}" },
]

[icon]
dirs = [
	{ name = ".config", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = ".git", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = ".jj", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = ".github", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = ".npm", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Desktop", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Development", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Documents", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Downloads", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Library", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Movies", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Music", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Pictures", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Public", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Videos", text = "", fg = "{{colors.tertiary.default.hex}}" },
]

exts = [  
    { name = "jpg", text = "", fg = "{{colors.yellow.default.hex}}" },  
    { name = "png", text = "", fg = "{{colors.yellow.default.hex}}" },  
    { name = "gif", text = "", fg = "{{colors.yellow.default.hex}}" },  
    { name = "exr", text = "", fg = "{{colors.yellow.default.hex}}" },  
    { name = "tif", text = "", fg = "{{colors.yellow.default.hex}}" },  
      
    { name = "zip", text = "", fg = "{{colors.blue.default.hex}}" },  
    { name = "7z", text = "", fg = "{{colors.blue.default.hex}}" },  
    { name = "tar", text = "", fg = "{{colors.blue.default.hex}}" },
    { name = "gz", text = "", fg = "{{colors.blue.default.hex}}" }, 

    { name = "pdf", text = "", fg = "{{colors.green.default.hex}}" }, 
    { name = "epub", text = "", fg = "{{colors.green.default.hex}}" }, 
    { name = "md", text = "", fg = "{{colors.green.default.hex}}" }, 
]

conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#c6d0f5" },
	{ if = "link", text = "", fg = "#838ba7" },
	{ if = "block", text = "", fg = "#eebebe" },
	{ if = "char", text = "", fg = "#eebebe" },
	{ if = "fifo", text = "", fg = "#eebebe" },
	{ if = "sock", text = "", fg = "#eebebe" },
	{ if = "sticky", text = "", fg = "#eebebe" },
	{ if = "dummy", text = "", fg = "#e78284" },

	# Fallback
	{ if = "dir & hovered", text = "", fg = "#8caaee" },
	{ if = "dir", text = "", fg = "{{colors.primary.default.hex}}" },
	{ if = "exec", text = "", fg = "{{colors.red.default.hex}}" },
	{ if = "!dir", text = "", fg = "{{colors.secondary.default.hex}}" },
]
